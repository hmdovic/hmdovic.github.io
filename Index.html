<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vormiq | VORM. INTELLIGENTIE. TOEKOMST.</title>
    <style>
        :root {
            --bg-color: #0D0D0D;
            --primary-green: #BBF00;
            --primary-purple: #7B00FF;
            --text-white: #FFFFFF;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Satoshi', sans-serif; /* We gebruiken hier Satoshi */
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .logo {
            width: 200px; /* Pas aan naar eigen inzicht */
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            color: var(--text-white);
        }

        .tagline {
            color: var(--primary-green);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.9rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <img src="logo.png" alt="Vormiq Logo" class="logo">
    
    <h1>Vormiq</h1>
    <div class="tagline">Vorm. Intelligentie. Toekomst.</div>

</body>
</html>
