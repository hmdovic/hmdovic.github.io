<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vormiq</title>

<style>

/* BASE */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
color:white;
font-family:Inter, sans-serif;
overflow-x:hidden;
}

/* HEADER */
header{
position:fixed;
top:0;
width:100%;
display:flex;
align-items:center;
justify-content:space-between;
padding:18px 6%;
background:rgba(5,5,5,0.75);
backdrop-filter:blur(18px);
border-bottom:1px solid rgba(255,255,255,0.05);
z-index:999;
}

/* LOGO */
.logo-wrapper{
display:flex;
flex-direction:column;
align-items:flex-start;
gap:2px;
}

.logo{
height:68px;
width:auto;
}

.logo-sub{
font-size:0.7rem;
color:#888;
letter-spacing:2px;
text-transform:uppercase;
}

/* HERO */
.hero{
min-height:70vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:130px 6% 60px;
}

.hero h1{
font-size:clamp(2.2rem,5vw,4rem);
font-weight:900;
line-height:1.05;
}

.hero p{
max-width:720px;
color:#aaa;
margin-top:15px;
font-size:1.05rem;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:18px;
padding:60px 6%;
}

/* VIDEO CARD */
.card{
position:relative;
border-radius:18px;
overflow:hidden;
background:black;
border:1px solid rgba(255,255,255,0.06);
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.02);
border-color:#CCFF00;
}

.card video{
width:100%;
height:420px;
object-fit:cover;
display:block;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.95);
display:none;
align-items:center;
justify-content:center;
z-index:1000;
}

.modal video{
width:80%;
max-height:85vh;
}

.close{
position:absolute;
top:20px;
right:25px;
font-size:2.5rem;
cursor:pointer;
color:white;
}

/* MOBILE */
@media (max-width:768px){

header{
padding:14px 5%;
}

.logo{
height:58px;
}

.logo-sub{
font-size:0.65rem;
}

.hero{
padding:140px 5% 50px;
}

.hero h1{
font-size:2.1rem;
}

.hero p{
font-size:1rem;
}

.grid{
grid-template-columns:1fr;
gap:14px;
padding:40px 5%;
}

.card video{
height:70vh;
}

.modal video{
width:95%;
}

.close{
top:15px;
right:15px;
}

}

</style>
</head>

<body>

<header>
    <div class="logo-wrapper">
        <img src="logo.png" class="logo">
        <div class="logo-sub">Creative Studio</div>
    </div>
</header>

<section class="hero">
    <h1>Creatieve content die aandacht pakt.</h1>
    <p>Satire, experimenten en short-form visuals ontworpen voor bereik en impact.</p>
</section>

<section class="grid">

    <div class="card" onclick="openVideo('verward.mp4')">
        <video src="verward.mp4" muted loop autoplay playsinline></video>
    </div>

    <div class="card" onclick="openVideo('flodders.mp4')">
        <video src="flodders.mp4" muted loop autoplay playsinline></video>
    </div>

    <div class="card" onclick="openVideo('skiezo.mp4')">
        <video src="skiezo.mp4" muted loop autoplay playsinline></video>
    </div>

    <div class="card" onclick="openVideo('teletubbies.mp4')">
        <video src="teletubbies.mp4" muted loop autoplay playsinline></video>
    </div>

</section>

<!-- FULLSCREEN MODAL -->
<div class="modal" id="modal">
    <div class="close" onclick="closeVideo()">×</div>
    <video id="modalVideo" controls autoplay></video>
</div>

<script>

function openVideo(src){
    const modal = document.getElementById('modal');
    const video = document.getElementById('modalVideo');

    modal.style.display = 'flex';
    video.src = src;
    video.muted = false;
}

function closeVideo(){
    const modal = document.getElementById('modal');
    const video = document.getElementById('modalVideo');

    modal.style.display = 'none';
    video.pause();
    video.src = "";
}

</script>

</body>
